<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Volunteers Unite</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- Hero Section -->
         <section class="hero">
            <div class="logo">
                <div class="image-class">
                    <img src="../images/animal-shelter.svg" />
                </div>
                <div class="hands-of-hope">
                    <h1>Hands of Hope</h1>
                    <h3>Making Volunteering Easy and Impactful</h3>
                </div>
            </div>
            <div class="hero-text">
                <div class="heading">
                    <h1>Find meaningful ways to help.</h1>
                </div>
                <div class="subheading">
                    <p>Connect with local and remote opportunities, lend your skills, and make a real impact on your schedule.</p>
                </div>
                <div class="cta-buttons">
                    <button class="btn-success">Sign Up to Volunteer</button>
                    <button class="btn">Browse Projects</button>
                </div>
            </div>
         </section>
    </body>
</html>
